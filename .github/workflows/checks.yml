name: Fast checks

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Install cargo audit
        run: cargo install cargo-audit
      - name: Audit dependencies
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2026-0186

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Install Linux dependencies
        run: .github/scripts/setup-linux.sh
      - name: Check the project
        run: |
          cargo check --workspace --all-targets --all-features

  deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Install cargo deny
        run: cargo install cargo-deny
      - name: Check licenses
        run: cargo deny check --allow duplicate

  doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Install Linux dependencies
        run: .github/scripts/setup-linux.sh
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items --all-features

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install --component rustfmt --no-self-update
      - name: Check formatting
        run: cargo fmt --all --check
