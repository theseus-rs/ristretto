[target.riscv64gc-unknown-linux-gnu]
image = "ghcr.io/cross-rs/riscv64gc-unknown-linux-gnu:edge"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "sed -i \"s/Architectures: arm64 armhf/Architectures: arm64 armhf $CROSS_DEB_ARCH/\" /etc/apt/sources.list.d/ubuntu.sources",
    "apt-get update && apt-get install --assume-yes gcc-riscv64-linux-gnu libasound2-dev:$CROSS_DEB_ARCH",
]

[target.riscv64gc-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "HOME=/tmp",
]

[target.s390x-unknown-linux-gnu]
image = "ghcr.io/cross-rs/s390x-unknown-linux-gnu:edge"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "sed -i \"s/Architectures: arm64 armhf/Architectures: arm64 armhf $CROSS_DEB_ARCH/\" /etc/apt/sources.list.d/ubuntu.sources",
    "apt-get update && apt-get install --assume-yes gcc-s390x-linux-gnu libasound2-dev:$CROSS_DEB_ARCH",
]

[target.s390x-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "HOME=/tmp",
]
